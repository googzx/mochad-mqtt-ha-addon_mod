---
name: "mochad-mqtt-ha-addon"
version: 1.01
slug: "mochad-mqtt-ha-addon"
description: >
  Make X10 devices appear as MQTT devices. 
  Requires Mochad and Mosquitto addons
init: false
hassio_api: true
services:
  - mqtt:want
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  devices:
    - name: ActiveEye motion 1
      code: B1
      type: sensor
    - name: Front door
      code: P1
      type: sensor
    - name: Garage door
      code: P2
      type: sensor
    - name: Kitchen door
      code: P3
      type: sensor
    - name: Back door
      code: P4
      type: sensor
    - name: lr motion
      code: P7
      type: sensor
    - name: Front door replace battery
      code: O1
      type: sensor
    - name: Garage door replace battery
      code: O2
      type: sensor
    - name: Kitchen door replace battery
      code: O3
      type: sensor
    - name: Back door replace battery
      code: O4
      type: sensor
  mqtt:
    - host: "xxxxxxxx"
      port: 1883
      user: "xxxxxxxx"
      password: "xxxxxxxx"
      ping: "ping/x10/_ping"
      prefix: "home/x10"
  mochad:
    - host: "homeassistant"
      port: 1099
  hass:
    - discovery_enable: "true"
      startup_payload: "online"
      status_topic: "homeassistant/status"
      topic_prefix: "homeassistant"
schema:
  devices:
    - name: str
      code: str
      type: list(switch|light|sensor|remote)
      retain: bool?
  mqtt:
    - host: str
      port: port
      user: str?
      password: password?
      ping: str?
      prefix: str?
  mochad:
    - host: str
      port: port
  hass:
    - discovery_enable: str?
      startup_payload: str?
      status_topic: str?
      topic_prefix: str?
